# Dependabot configuration — AI_OS Doctrine §3.6.6 + DP#56 + DP#118
# Created: 2026-04-28 (Phase 2 Round 1 follow-up — distribute pattern from AOKP)
#
# Scopes:
#   - pip dependencies (Python 3.11+ FastAPI, stdlib + minimal deps per ATP zero-deps policy)
#   - GitHub Actions (CI workflow updates: ci.yml)
# Schedule: weekly Monday 03:00 (Asia/Ho_Chi_Minh = UTC+7)
# PR limit: 5 open at a time per ecosystem
version: 2

updates:
  # pip package updates
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group security patches across all packages into 1 PR
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
    # Ignore production-dep major bumps (require human review per ATP zero-deps policy)
    ignore:
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "anthropic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
