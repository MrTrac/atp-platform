type: object
title: ATP Request
required:
  - request_id
  - request_type
  - execution_intent
  - payload
  - metadata
properties:
  request_id:
    type: string
  product:
    type: string
  product_hint:
    type: string
  provider:
    type: string
  adapter:
    type: string
  capability:
    type: string
  request_type:
    type: string
  execution_intent:
    type: string
  payload:
    type: object
    properties:
      command_argv:
        type: array
      command:
        type: string
  metadata:
    type: object
additionalProperties: true
